<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAGE:MP — Онлайн серверов</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0c12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,165,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,165,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb-1 { width:400px;height:400px;background:#ff6a00;top:-100px;left:-100px;opacity:.15;animation:pulse 6s ease-in-out infinite; }
    .orb-2 { width:350px;height:350px;background:#7b2fff;bottom:-80px;right:-80px;opacity:.15;animation:pulse 8s ease-in-out infinite reverse; }
    @keyframes pulse {
      0%,100% { opacity:.12; transform:scale(1); }
      50%      { opacity:.22; transform:scale(1.1); }
    }

    .wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 40px 20px;
    }

    .header { text-align: center; }
    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 6px; color: #ff6a00;
      text-transform: uppercase; margin-bottom: 8px; opacity: .9;
    }
    .title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 36px; font-weight: 700;
      color: #fff; letter-spacing: 2px; text-transform: uppercase;
    }
    .title span { color: #ff6a00; }
    .subtitle {
      font-size: 13px; color: rgba(255,255,255,.35);
      margin-top: 6px; letter-spacing: 1px;
    }

    .cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }

    .card {
      width: 300px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 32px 28px 28px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
      transition: transform .3s ease, box-shadow .3s ease;
    }
    .card:hover { transform:translateY(-6px); box-shadow:0 20px 60px rgba(0,0,0,.5); }
    .card::before {
      content:''; position:absolute; top:0;left:0;right:0;
      height:2px; background:var(--accent);
    }
    .card::after {
      content:''; position:absolute; top:-60px;left:50%;
      transform:translateX(-50%); width:200px;height:200px;
      background:var(--accent); border-radius:50%;
      filter:blur(60px); opacity:.08; pointer-events:none;
    }
    .card.delperro { --accent: #ff6a00; }
    .card.lapuerta { --accent: #7b2fff; }

    .server-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
      border-radius:8px; padding:5px 10px;
      font-size:11px; font-weight:600; letter-spacing:1.5px;
      color:rgba(255,255,255,.5); text-transform:uppercase; margin-bottom:20px;
    }
    .badge-dot {
      width:6px;height:6px;border-radius:50%;
      background:var(--accent); box-shadow:0 0 6px var(--accent);
      animation:blink 2s ease-in-out infinite;
      flex-shrink:0;
    }
    .badge-dot.loading {
      background:transparent;
      border:2px solid var(--accent); border-top-color:transparent;
      width:8px;height:8px;
      animation:spin 1s linear infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes spin  { to{transform:rotate(360deg)} }

    .server-name {
      font-family:'Rajdhani',sans-serif;
      font-size:28px;font-weight:700;color:#fff;
      letter-spacing:1px;margin-bottom:6px;
    }
    .server-desc { font-size:12px;color:rgba(255,255,255,.3);margin-bottom:28px; }

    .counter-block { display:flex;align-items:flex-end;gap:10px;margin-bottom:20px; }
    .count {
      font-family:'Rajdhani',sans-serif;
      font-size:72px;font-weight:700;line-height:1;
      color:var(--accent);text-shadow:0 0 30px var(--accent);
      letter-spacing:-2px;
      transition:opacity .25s;
    }
    .count.fade { opacity:.3; }
    .count-label {
      font-size:12px;color:rgba(255,255,255,.35);font-weight:600;
      letter-spacing:1px;text-transform:uppercase;padding-bottom:12px;
    }

    .bar-wrap { background:rgba(255,255,255,.06);border-radius:6px;height:6px;overflow:hidden;margin-bottom:16px; }
    .bar-fill {
      height:100%;border-radius:6px;
      background:var(--accent);box-shadow:0 0 8px var(--accent);
      transition:width .8s cubic-bezier(.4,0,.2,1);
    }

    .card-footer {
      display:flex;justify-content:space-between;align-items:center;
      font-size:11px;color:rgba(255,255,255,.25);
    }
    .lang-tag {
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
      border-radius:6px;padding:3px 8px;
      font-size:11px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.5px;
    }

    /* Bottom bar */
    .bottom-bar {
      display:flex;flex-direction:column;align-items:center;gap:6px;
    }
    .refresh-status {
      display:flex;align-items:center;gap:8px;
      font-size:11px;color:rgba(255,255,255,.2);letter-spacing:.5px;
    }
    .refresh-ring { position:relative;width:16px;height:16px; }
    .refresh-ring svg { transform:rotate(-90deg); }
    .refresh-ring circle { fill:none;stroke:rgba(255,165,0,.15);stroke-width:2; }
    .refresh-ring .progress {
      stroke:rgba(255,165,0,.5);
      stroke-dasharray: 37.7;
      stroke-dashoffset: 37.7;
      transition:stroke-dashoffset 1s linear;
    }
    .page-footer { font-size:11px;color:rgba(255,255,255,.15);letter-spacing:1px; }
    .page-footer span { color:rgba(255,165,0,.4); }
    .error-hint { font-size:10px;color:rgba(255,100,100,.6);letter-spacing:.3px;text-align:center;max-width:380px;line-height:1.5; }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrapper">

  <div class="header">
    <div class="logo">RAGE Multiplayer</div>
    <div class="title">Онлайн <span>серверов</span></div>
    <div class="subtitle" id="lastUpdated">Загрузка данных...</div>
  </div>

  <div class="cards">

    <div class="card delperro">
      <div class="server-badge">
        <div class="badge-dot loading" id="dot-delperro"></div>
        RAGE:MP Server
      </div>
      <div class="server-name">Del Perro</div>
      <div class="server-desc">Русский сервер · GTA V RP</div>
      <div class="counter-block">
        <div class="count fade" id="count-delperro">—</div>
        <div class="count-label">игроков<br>онлайн</div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" id="bar-delperro" style="width:0%"></div></div>
      <div class="card-footer">
        <span id="max-delperro">загрузка...</span>
        <span class="lang-tag">Русский</span>
      </div>
    </div>

    <div class="card lapuerta">
      <div class="server-badge">
        <div class="badge-dot loading" id="dot-lapuerta"></div>
        RAGE:MP Server
      </div>
      <div class="server-name">La Puerta</div>
      <div class="server-desc">Русский сервер · GTA V RP</div>
      <div class="counter-block">
        <div class="count fade" id="count-lapuerta">—</div>
        <div class="count-label">игроков<br>онлайн</div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" id="bar-lapuerta" style="width:0%"></div></div>
      <div class="card-footer">
        <span id="max-lapuerta">загрузка...</span>
        <span class="lang-tag">Русский</span>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <div class="refresh-status">
      <div class="refresh-ring">
        <svg width="16" height="16" viewBox="0 0 14 14">
          <circle cx="7" cy="7" r="6"/>
          <circle class="progress" id="refreshProgress" cx="7" cy="7" r="6"/>
        </svg>
      </div>
      <span id="refreshCountdown">обновление через 5:00</span>
    </div>
    <div class="page-footer">Данные: <span>rage.mp/masterlist</span></div>
    <div class="error-hint" id="errorHint"></div>
  </div>

</div>

<script>
  // ── Конфиг ──────────────────────────────────────────────────────
  // Ищем серверы по подстроке в имени (регистр не важен)
  const TARGETS = [
    { key: 'delperro', nameContains: 'del perro' },
    { key: 'lapuerta', nameContains: 'la puerta' },
  ];
  const REFRESH_SEC = 5 * 60;
  const MASTERLIST  = 'https://rage.mp/masterlist/';

  // ── Хелперы ─────────────────────────────────────────────────────
  function fmt(n) {
    return n >= 1000
      ? Math.floor(n / 1000) + '\u00a0' + String(n % 1000).padStart(3, '0')
      : String(n);
  }

  function setLoading(key) {
    document.getElementById('dot-'   + key).className = 'badge-dot loading';
    document.getElementById('count-' + key).classList.add('fade');
  }

  function setData(key, players, maxplayers) {
    const dot   = document.getElementById('dot-'   + key);
    const count = document.getElementById('count-' + key);
    const bar   = document.getElementById('bar-'   + key);
    const maxEl = document.getElementById('max-'   + key);

    count.classList.add('fade');
    setTimeout(() => {
      count.textContent = fmt(players);
      count.classList.remove('fade');
    }, 250);

    bar.style.width = Math.min(100, Math.round(players / maxplayers * 100)) + '%';
    maxEl.textContent = 'из ' + fmt(maxplayers) + ' макс.';

    dot.className = 'badge-dot';   // убираем спиннер, включаем blink
  }

  function setError(key) {
    document.getElementById('dot-'   + key).className = 'badge-dot';
    document.getElementById('count-' + key).classList.remove('fade');
  }

  // ── Основной запрос ─────────────────────────────────────────────
  async function fetchAll() {
    TARGETS.forEach(t => setLoading(t.key));
    document.getElementById('errorHint').textContent = '';

    let data;
    try {
      const res = await fetch(MASTERLIST);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (err) {
      console.error('Masterlist fetch error:', err);
      TARGETS.forEach(t => setError(t.key));
      document.getElementById('errorHint').textContent =
        'Не удалось получить данные с rage.mp/masterlist. ' +
        'Возможно, сайт блокирует прямые запросы из браузера (CORS). ' +
        'Для работы плашки на реальном сайте потребуется небольшой прокси на сервере.';
      updateSubtitle(false);
      return;
    }

    // data — объект вида { "ip:port": { name, players, maxplayers, ... }, ... }
    // Ищем нужные серверы по имени
    const found = {};
    for (const [ip, srv] of Object.entries(data)) {
      if (!srv || typeof srv.name !== 'string') continue;
      const nameLower = srv.name.toLowerCase();
      for (const t of TARGETS) {
        if (!found[t.key] && nameLower.includes(t.nameContains)) {
          found[t.key] = srv;
        }
      }
    }

    let anyMissing = false;
    for (const t of TARGETS) {
      if (found[t.key]) {
        setData(t.key, found[t.key].players ?? 0, found[t.key].maxplayers ?? 1300);
      } else {
        setError(t.key);
        anyMissing = true;
        console.warn('Сервер не найден в мастерлисте:', t.nameContains);
      }
    }

    if (anyMissing) {
      document.getElementById('errorHint').textContent =
        'Один или несколько серверов не найдены в мастерлисте. ' +
        'Проверьте написание в настройках.';
    }

    updateSubtitle(true);
  }

  function updateSubtitle(ok) {
    const now = new Date();
    const t = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('lastUpdated').textContent =
      ok ? 'Обновлено в ' + t : 'Ошибка обновления в ' + t;
  }

  // ── Таймер ──────────────────────────────────────────────────────
  let secondsLeft = REFRESH_SEC;
  const CIRCUM = 2 * Math.PI * 6; // ≈ 37.7

  setInterval(() => {
    secondsLeft--;
    if (secondsLeft <= 0) {
      secondsLeft = REFRESH_SEC;
      fetchAll();
    }
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    document.getElementById('refreshCountdown').textContent =
      'обновление через ' + m + ':' + String(s).padStart(2, '0');

    const offset = CIRCUM * (1 - secondsLeft / REFRESH_SEC);
    document.getElementById('refreshProgress').style.strokeDashoffset =
      CIRCUM - offset;
  }, 1000);

  // ── Старт ───────────────────────────────────────────────────────
  fetchAll();
</script>
</body>
</html>
