<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIME NEON FARM - CyberTracker</title>
<link rel="icon" type="image/png" href="https://gta5rpbp.ru/favicon.ico">
<style>
  /* ------------------------------
     КИБЕРПАНК / ЗВЁЗДНЫЕ ВОЙНЫ СТИЛЬ
     ------------------------------ */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', 'Orbitron', 'Rajdhani', system-ui, -apple-system, 'Montserrat', sans-serif;
    background: radial-gradient(circle at 20% 30%, #0b0e1a, #03050b);
    color: #eef5ff;
    padding: 20px;
    line-height: 1.4;
  }

  /* контейнер */
  .layout {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
  }

  /* голографическая линия сверху */
  .layout::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #0ff, #f0f, #ff0, #0ff);
    background-size: 300%;
    animation: scanline 6s linear infinite;
    z-index: 1000;
    pointer-events: none;
  }
  @keyframes scanline {
    0% { background-position: 0% 0%; }
    100% { background-position: 300% 0%; }
  }

  /* заголовок */
  h1 {
    font-size: 2.2rem;
    text-align: center;
    margin: 0 0 10px 0;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #0ff, #f0f, #ffcc00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 8px rgba(0,255,255,0.5);
    font-weight: 800;
  }

  /* панель управления (кнопки, VIP, x2) */
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: rgba(10, 20, 40, 0.65);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 60px;
    padding: 12px 24px;
    margin-bottom: 24px;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
  }

  .controls button, .toggle-group {
    font-size: 1rem;
    font-weight: bold;
    padding: 10px 20px;
    border-radius: 40px;
    background: #111822;
    border: 1px solid #2affce;
    color: #c0ffff;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .controls button:hover {
    background: #1e2a3a;
    transform: scale(0.97);
    box-shadow: 0 0 12px cyan;
    border-color: #ff44ff;
  }
  .toggle-group {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #0a0f1c;
    border-color: #f0f;
  }
  .toggle-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 1rem;
  }
  input[type="checkbox"] {
    width: 20px;
    height: 20px;
    transform: scale(1.1);
    accent-color: #0ff;
    cursor: pointer;
  }

  /* Легенда (цветные чипы) */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    background: rgba(5, 12, 25, 0.6);
    backdrop-filter: blur(4px);
    border-radius: 40px;
    padding: 12px 24px;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 0, 255, 0.3);
  }
  .legend .item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
    font-weight: 500;
  }
  .chip {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    box-shadow: 0 0 4px currentColor;
  }

  /* сетка колонок */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 24px;
  }

  /* карточки колонок */
  .column {
    border-radius: 28px;
    padding: 16px 14px;
    background: rgba(8, 14, 26, 0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 255, 255, 0.3);
    transition: all 0.2s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }
  .column:hover {
    border-color: #ff44ff;
    box-shadow: 0 0 12px rgba(255, 68, 255, 0.4);
  }
  .column h2 {
    font-size: 1.45rem;
    margin-bottom: 14px;
    padding-bottom: 6px;
    border-bottom: 2px solid rgba(0, 255, 255, 0.6);
    display: inline-block;
    letter-spacing: 1px;
    font-weight: 800;
    background: linear-gradient(120deg, #fff, #0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* таблицы заданий */
  .tasks-column {
    width: 100%;
    border-collapse: collapse;
  }
  .tasks-column tr {
    cursor: pointer;
    transition: background 0.1s ease;
    border-radius: 16px;
  }
  .tasks-column td {
    padding: 12px 8px;
    border-bottom: 1px solid rgba(100, 150, 255, 0.2);
    vertical-align: middle;
    font-size: 0.9rem;
    font-weight: 500;
  }
  .tasks-column tr:hover td {
    background: rgba(0, 255, 255, 0.1);
    text-shadow: 0 0 2px cyan;
  }
  /* выполненные задания */
  .tasks-column tr.done td:first-child {
    text-decoration: line-through;
    text-decoration-color: #0ff;
    text-decoration-thickness: 2px;
    opacity: 0.8;
    color: #8acbcb;
  }
  .tasks-column tr.done td {
    background: rgba(0, 255, 255, 0.08);
  }

  /* Награды (BP) */
  .reward {
    font-weight: 800;
    font-size: 0.9rem;
    text-align: center;
    background: rgba(0,0,0,0.4);
    border-radius: 20px;
    padding: 4px 8px;
    min-width: 60px;
    display: inline-block;
    border: 1px solid rgba(0, 255, 255, 0.4);
    box-shadow: inset 0 0 6px rgba(0,255,255,0.2);
    letter-spacing: 0.5px;
  }

  /* онлайн-блок (3 часа) */
  .online-bubble {
    margin-top: 16px;
    background: linear-gradient(145deg, #0a1220, #03070f);
    border-radius: 50px;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #ffcc00;
    box-shadow: 0 0 8px gold;
  }
  .online-bubble .bp {
    font-weight: 800;
    font-size: 1.2rem;
    color: #ffcc33;
  }

  /* фракционные кнопка */
  #fractionToggle {
    margin: 16px 0 8px;
    background: #111b2c;
    border: 1px solid #ff44ff;
    color: #ffb3ff;
    padding: 8px 16px;
    border-radius: 60px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    width: 100%;
  }
  #fractionToggle:hover {
    background: #2a1e3a;
    box-shadow: 0 0 10px magenta;
  }
  .fraction-table {
    margin-top: 6px;
    width: 100%;
    border-collapse: collapse;
    background: rgba(30, 10, 50, 0.5);
    border-radius: 24px;
    overflow: hidden;
  }

  /* итого + осталось — киберпанк ульта */
  .total {
    display: flex;
    gap: 20px;
    margin: 20px 0 24px;
    flex-wrap: wrap;
  }
  .total-card {
    flex: 1;
    background: rgba(5, 12, 30, 0.7);
    backdrop-filter: blur(16px);
    border-radius: 32px;
    padding: 16px 24px;
    text-align: center;
    border: 1px solid rgba(0, 255, 255, 0.5);
    transition: all 0.2s ease;
  }
  .total-card .label {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 600;
    opacity: 0.9;
    margin-bottom: 8px;
  }
  .total-card .value {
    font-size: 3rem;
    font-weight: 900;
    line-height: 1.2;
    background: linear-gradient(135deg, #fff, cyan);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 8px cyan;
  }
  .total-card.left .value {
    background: linear-gradient(135deg, #0ff, #f0f, #ffcc00);
    -webkit-background-clip: text;
    background-clip: text;
  }
  .total-card.right .value {
    background: linear-gradient(135deg, #ffd966, #ffb347);
    -webkit-background-clip: text;
    background-clip: text;
    text-shadow: 0 0 10px orange;
  }
  .total-card.left {
    border-right: 2px solid cyan;
  }
  .total-card.right {
    border-left: 2px solid gold;
  }

  /* адаптив */
  @media (max-width: 1000px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 640px) {
    .grid {
      grid-template-columns: 1fr;
    }
    .controls {
      flex-direction: column;
      align-items: stretch;
      border-radius: 28px;
    }
    .toggle-group {
      justify-content: space-between;
    }
    .total {
      flex-direction: column;
    }
    .total-card.left, .total-card.right {
      border: 1px solid cyan;
    }
  }

  /* Темная тема уже есть, но дополнительно усилим */
  html.dark body {
    background: radial-gradient(circle at 30% 20%, #0a0f1c, #010101);
  }
  /* кастомный скролл */
  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #111;
  }
  ::-webkit-scrollbar-thumb {
    background: cyan;
    border-radius: 10px;
  }
  button, .toggle-group label {
    user-select: none;
  }
</style>
</head>

    { cat:"Средние", name:"25 действий на стройке", baseVip:4, baseNoVip:2 },
    { cat:"Средние", name:"25 действий в порту", baseVip:4, baseNoVip:2 },

    { cat:"Совместные", name:"Победить в армрестлинге", baseVip:2, baseNoVip:1 },
    { cat:"Совместные", name:"Починка авто другому игроку", baseVip:4, baseNoVip:2 },

    { cat:"Не хочется", name:"10 посылок на почте", baseVip:2, baseNoVip:1 },
    { cat:"Не хочется", name:"Прокрутить за DP серебрянный или золотой кейс", baseVip:20, baseNoVip:10 },
    { cat:"Не хочется", name:"Заказ материалов для бизнеса вручную (просто прожать вкл/выкл)", baseVip:2, baseNoVip:1 },
    { cat:"Не хочется", name:"Потушить 25 'огоньков' пожарным", baseVip:2, baseNoVip:1 },
    { cat:"Не хочется", name:"Два раза оплатить смену внешности у хирурга в EMS", baseVip:4, baseNoVip:2 },
    { cat:"Не хочется", name:"Принять участие в двух аирдропах", baseVip:8, baseNoVip:4 },

    { cat:"Фракционные", name:"7 закрашенных граффити", baseVip:1, baseNoVip:1, isFraction:true, finalMult:4 },
    { cat:"Фракционные", name:"Сдать 5 контрабанды", baseVip:2, baseNoVip:2, isFraction:true, finalMult:4 },
    { cat:"Фракционные", name:"Участие в каптах/бизварах", baseVip:1, baseNoVip:1, isFraction:true, finalMult:4 },

    { cat:"Фракционные", name:"Закрыть 5 кодов в силовых структурах", baseVip:2, baseNoVip:2, isFraction:true, finalMult:4 },
    { cat:"Фракционные", name:"Поставить на учет 2 автомобиля (для LSPD)", baseVip:1, baseNoVip:1, isFraction:true, finalMult:4 },
    { cat:"Фракционные", name:"Произвести 1 арест в КПЗ", baseVip:1, baseNoVip:1, isFraction:true, finalMult:4 },
    { cat:"Фракционные", name:"Выкупить двух человек из КПЗ", baseVip:2, baseNoVip:2, isFraction:true, finalMult:4 },
    { cat:"Фракционные", name:"Посадить траву в теплице", baseVip:2, baseNoVip:2, isFraction:true, finalMult:8 },
    { cat:"Фракционные", name:"Запустить переработку обезболивающих в лаборатории", baseVip:2, baseNoVip:2, isFraction:true, finalMult:8 }
  ];

  // Состояния
  let taskStates = new Array(tasksList.length).fill(false);
  let vip = false, x2 = false;
  const STORAGE_KEY = 'lime_tasks_v4';
  const VIP_KEY = 'lime_vip';
  const X2_KEY = 'lime_x2';

  function getBaseValue(idx, vipActive) {
    const t = tasksList[idx];
    let base = vipActive ? t.baseVip : t.baseNoVip;
    if (t.isFraction) {
      base = base * (t.finalMult || 1);
    }
    return base;
  }

  function getCurrentValue(idx) {
    let base = getBaseValue(idx, vip);
    if (x2) base *= 2;
    return base;
  }

  function calcTotals() {
    let total = 0, maxPossible = 0;
    for (let i = 0; i < tasksList.length; i++) {
      let val = getCurrentValue(i);
      if (taskStates[i]) total += val;
      if (!tasksList[i].isFraction) maxPossible += val;
    }
    return { total, maxPossible, remaining: Math.max(0, maxPossible - total) };
  }

  function renderTasks() {
    const containers = {
      "Легкие": document.getElementById("easy-tbody"),
      "Средние": document.getElementById("mid-tbody"),
      "Совместные": document.getElementById("joint-tbody"),
      "Не хочется": document.getElementById("avoid-tbody"),
      "Фракционные": document.getElementById("fraction-tbody")
    };
    for (let cat in containers) if(containers[cat]) containers[cat].innerHTML = '';

    for (let i = 0; i < tasksList.length; i++) {
      const t = tasksList[i];
      const val = getCurrentValue(i);
      const checked = taskStates[i];
      const tr = document.createElement("tr");
      tr.className = checked ? "done" : "";
      tr.dataset.index = i;
      const tdName = document.createElement("td");
      tdName.textContent = t.name;
      const tdCheck = document.createElement("td");
      tdCheck.style.width = "1px";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = checked;
      cb.addEventListener("change", (e) => { e.stopPropagation(); toggleTask(i, cb.checked); });
      tdCheck.appendChild(cb);
      const tdReward = document.createElement("td");
      tdReward.className = "reward";
      tdReward.textContent = val + " BP";
      tr.appendChild(tdName);
      tr.appendChild(tdCheck);
      tr.appendChild(tdReward);
      tr.addEventListener("click", (e) => {
        if (e.target.tagName !== 'INPUT') {
          const newState = !taskStates[i];
          toggleTask(i, newState);
        }
      });
      const target = containers[t.cat];
      if (target) target.appendChild(tr);
    }
    // онлайновый бонус
    const onlineBase = 2;
    const onlineVal = onlineBase * (vip ? 2 : 1) * (x2 ? 2 : 1);
    document.getElementById("onlineBp").innerText = onlineVal + " BP";
    const totals = calcTotals();
    document.getElementById("totalDisplay").innerHTML = totals.total + " BP";
    document.getElementById("remainingDisplay").innerHTML = totals.remaining + " BP";
    saveState();
  }

  function toggleTask(idx, state) {
    taskStates[idx] = state;
    renderTasks();
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(taskStates));
    localStorage.setItem(VIP_KEY, vip);
    localStorage.setItem(X2_KEY, x2);
  }

  function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const arr = JSON.parse(saved);
        if (arr.length === tasksList.length) taskStates = arr;
      } catch(e) {}
    }
    const savedVip = localStorage.getItem(VIP_KEY);
    if (savedVip !== null) vip = savedVip === 'true';
    const savedX2 = localStorage.getItem(X2_KEY);
    if (savedX2 !== null) x2 = savedX2 === 'true';
    document.getElementById("vipCheckbox").checked = vip;
    document.getElementById("x2Checkbox").checked = x2;
    renderTasks();
  }

  function resetAll() {
    taskStates.fill(false);
    vip = false; x2 = false;
    document.getElementById("vipCheckbox").checked = false;
    document.getElementById("x2Checkbox").checked = false;
    renderTasks();
  }

  document.getElementById("resetBtn").addEventListener("click", resetAll);
  document.getElementById("vipCheckbox").addEventListener("change", (e) => { vip = e.target.checked; renderTasks(); });
  document.getElementById("x2Checkbox").addEventListener("change", (e) => { x2 = e.target.checked; renderTasks(); });
  const fractionToggle = document.getElementById("fractionToggle");
  const fractionTable = document.getElementById("fractionTable");
  fractionToggle.addEventListener("click", () => {
    const isVisible = fractionTable.style.display === "table";
    fractionTable.style.display = isVisible ? "none" : "table";
    fractionToggle.textContent = isVisible ? "🌀 ФРАКЦИОННЫЕ ЗАДАНИЯ 🌀" : "🌀 СКРЫТЬ ФРАКЦИОННЫЕ 🌀";
  });

  // тема
  const themeBtn = document.getElementById("themeBtn");
  themeBtn.addEventListener("click", () => {
    document.documentElement.classList.toggle("dark");
    themeBtn.textContent = document.documentElement.classList.contains("dark") ? "🌙 ТЕМА" : "☀️ ТЕМА";
  });
  loadState();
</script>
</body>
</html>
